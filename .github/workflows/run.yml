name: Scavenger Cloud Engine

on:
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get the Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Google SDK
      run: pip install google-genai
      
    - name: Run Scavenger Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scavenger.py
      
    - name: Save Report to GitHub
      run: |
        git config --global user.name "Scavenger Bot"
        git config --global user.email "bot@scavenger.internal"
        git add reports/
        # Foolproof commit command: Try to commit, if nothing changed, just echo and move on
        git commit -m "Automated Fact-Check Update" || echo "No changes to commit"
        git push || echo "No changes to push"
        
