name: Scavenger Cloud Engine

on:
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v4

    - name: Initialize Isolated Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically tracks dependencies

    - name: Install Linux Core Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # CRUCIAL FIX: Forcing explicit python context installation
    - name: Bind and Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install google-genai yt-dlp
      
    - name: Execute High-Precision Scavenger Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scavenger.py
      
    - name: Commit Forensic Reports to Repository Mainframe
      run: |
        git config --global user.name "Scavenger Bot"
        git config --global user.email "bot@scavenger.internal"
        git add reports/
        git commit -m "Automated Forensic Fact-Check Update" || echo "No data modifications detected."
        git push || echo "Mainframe push skipped."
        
