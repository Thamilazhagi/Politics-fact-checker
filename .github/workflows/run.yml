name: Autonomous Scout Engine

on:
  schedule:
    - cron: '0 */2 * * *' # Runs automatically every 2 hours
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install google-genai feedparser streamlit groq
        
    - name: Execute Hybrid Scout Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python scout.py
      
    - name: Commit Database and Reports
      run: |
        git config --global user.name "Scavenger Bot"
        git config --global user.email "bot@scavenger.internal"
        git add reports/ database.json
        git commit -m "Scout Engine Update" || echo "No changes"
        git push || echo "No changes"
        
